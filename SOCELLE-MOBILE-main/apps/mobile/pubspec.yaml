name: socelle_mobile
description: SOCELLE — Professional Beauty & Medspa Intelligence Platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.0
  video_player: ^2.8.0
  chewie: ^1.7.0
  webview_flutter: ^4.7.0
  table_calendar: ^3.0.0
  fl_chart: ^0.68.0
  image_picker: ^1.0.0
  share_plus: ^9.0.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/GeneralSans-Regular.otf
          weight: 400
        - asset: assets/fonts/GeneralSans-Medium.otf
          weight: 500
        - asset: assets/fonts/GeneralSans-Semibold.otf
          weight: 600
        - asset: assets/fonts/GeneralSans-Bold.otf
          weight: 700
