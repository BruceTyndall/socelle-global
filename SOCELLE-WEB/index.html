    <style>
      #loading-splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #F6F3EF;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #loading-splash .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(20, 20, 24, 0.12);
        border-top-color: #6E879B;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loading-splash">
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
