<!DOCTYPE html>
<html>
<head>
  <title>Resetting Application...</title>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
        document.body.innerHTML = '<h2>Service Worker cleared. Redirecting...</h2>';
        setTimeout(() => {
          window.location.href = '/intelligence';
        }, 1000);
      });
    } else {
      window.location.href = '/intelligence';
    }
  </script>
</head>
<body>
  <h2>Resetting service worker...</h2>
</body>
</html>
