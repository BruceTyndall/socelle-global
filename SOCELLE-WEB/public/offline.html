<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOCELLE — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'General Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F6F3EF;
        color: #141418;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 420px;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 1rem;
        color: #6E879B;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      button {
        background: #141418;
        color: #F6F3EF;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        background: #2a2a30;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You're offline</h1>
      <p>SOCELLE requires an internet connection to load intelligence data. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
