name: CI

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop, 'release/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type check ───────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ── 2. Lint ─────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ── 3a. Build (production — TEST_MODE off) ───────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TEST_MODE: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── 3b. Build staging (TEST_MODE on — release/* branches only) ─
  build-staging:
    name: Build (Staging)
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    if: startsWith(github.ref, 'refs/heads/release/')
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_TEST_MODE: 'true'
      VITE_DEPLOY_BRANCH: ${{ github.ref_name }}
      VITE_DEPLOY_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (staging — TEST MODE banner enabled)
        run: npm run build

      - name: Upload staging build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-staging
          path: dist/
          retention-days: 7

  # ── 4. E2E tests ─────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Run against production build on main/develop; skipped on release/* (staging build used instead)
    needs: [build]
    if: "!startsWith(github.ref, 'refs/heads/release/')"
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── 5. Deploy to Cloudflare Pages (production — main only) ───
  #
  # ⛔ LAUNCH GATE: Only runs on push to main.
  # Doc Gate FAIL 4 is active — do NOT merge release/* to main
  # until Doc Gate PASS + explicit owner "GO LIVE" command.
  deploy:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: socelle
          directory: dist
          gitHubToken: ${{ github.token }}

  # ── 6. Deploy to Cloudflare Pages (staging — release/* only) ─
  #
  # Deploys as a Cloudflare Pages branch preview (not production).
  # Preview URL format: https://release-rc-2026-03-06.socelle.pages.dev
  # TEST MODE banner is baked into this build (VITE_TEST_MODE=true).
  # This job is completely independent of the production deploy job.
  deploy-staging:
    name: Deploy (Staging Preview)
    runs-on: ubuntu-latest
    needs: [build-staging]
    if: startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download staging build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-staging
          path: dist/

      - name: Deploy to Cloudflare Pages (staging preview)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: socelle
          directory: dist
          branch: ${{ github.ref_name }}
          gitHubToken: ${{ github.token }}
